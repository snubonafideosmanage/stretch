<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>반듯한정형외과 스트레칭 가이드</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
      background:linear-gradient(135deg,#8a7968 0%,#6b5d50 100%);
      min-height:100vh;
      padding:20px;
    }

    .container{max-width:1280px;margin:0 auto;}

    header{
      text-align:center;color:#fff;margin-bottom:24px;padding:38px 20px;
      backdrop-filter:blur(10px);
      background:rgba(255,255,255,0.10);
      border-radius:25px;
      box-shadow:0 8px 32px rgba(0,0,0,0.2);
    }
    header h1{font-size:2.1em;margin-bottom:10px;text-shadow:3px 3px 6px rgba(0,0,0,0.3);letter-spacing:1px;}
    header p{font-size:1.05em;opacity:0.95;font-weight:300;}

    /* ✅ 버튼 그리드: 모바일에서도 무조건 2열 */
    .nav-buttons{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      max-width:980px;
      margin:0 auto;
    }
    .nav-item{display:block;}
    .nav-item.full-width{grid-column:1 / -1;}

    .nav-btn{
      width:100%;
      background:linear-gradient(135deg,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0.90) 100%);
      color:#6b5d50;border:none;
      padding:18px 14px;border-radius:16px;
      font-size:0.95em;font-weight:800;
      cursor:pointer;transition:all .25s ease;
      box-shadow:0 6px 20px rgba(0,0,0,0.15);
      text-align:center;position:relative;overflow:hidden;
    }
    .nav-btn::before{
      content:'';position:absolute;top:0;left:-100%;
      width:100%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);
      transition:left .45s;
    }
    .nav-btn:hover::before{left:100%;}
    .nav-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,0.25);}
    .nav-btn.active{
      background:linear-gradient(135deg,#6b5d50 0%,#5a4d40 100%);
      color:#fff;
      box-shadow:0 10px 28px rgba(107,93,80,0.45);
    }

    /* ✅ 인라인 뷰어: 그리드 안에 삽입 + 2열 전체 폭 */
    .inline-viewer{
      grid-column:1 / -1;
      width:100%;
      border-radius:22px;
      overflow:hidden;
      background:linear-gradient(135deg,rgba(255,255,255,0.98) 0%,rgba(248,249,250,0.95) 100%);
      box-shadow:0 14px 40px rgba(0,0,0,0.22);
      animation:drop .22s ease;
    }
    @keyframes drop{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);} }

    .inline-viewer-inner{padding:14px;}

    .inline-viewer-head{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:6px 4px 12px 4px;
    }
    .inline-viewer-title{color:#6b5d50;font-size:1.2em;font-weight:900;letter-spacing:.2px;line-height:1.2;}

    /* ✅ X 버튼 */
    .inline-viewer-close{
      border:none;
      border-radius:999px;
      width:40px;
      height:40px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#6b5d50;
      color:#fff;
      font-weight:900;
      font-size:18px;
      line-height:1;
      cursor:pointer;
    }

    /* ✅ 원본 세로 크기(비율) 그대로: 절대 안 잘리고, 길면 스크롤 */
    .inline-viewer-img{
      width:100%;
      height:auto;
      max-height:none;
      display:block;
      border-radius:16px;
      background:#fff;
      box-shadow:0 10px 28px rgba(0,0,0,0.18);
    }

    footer{
      text-align:center;color:#fff;padding:34px 20px;margin-top:30px;
      backdrop-filter:blur(10px);
      background:rgba(255,255,255,0.10);
      border-radius:25px;
      box-shadow:0 8px 32px rgba(0,0,0,0.2);
      max-width:1280px;margin-left:auto;margin-right:auto;
    }
    footer p{opacity:0.95;margin:8px 0;font-size:1em;line-height:1.6;}

    @media (max-width:768px){
      body{padding:14px;}
      header{padding:30px 16px;}
      header h1{font-size:1.8em;}
      .nav-btn{padding:16px 10px;font-size:0.88em;border-radius:14px;}
      .inline-viewer-title{font-size:1.05em;}
    }
    @media (max-width:420px){
      .nav-btn{font-size:0.84em;padding:15px 9px;}
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>🧘‍♀️ 스트레칭 가이드</h1>
      <p>건강한 생활을 위한 스트레칭 방법을 확인하세요</p>
    </header>

    <!-- ✅ 캐러셀 대신: 버튼 클릭 → 바로 아래에 원본 비율 이미지 표시 -->
    <div class="nav-buttons" id="navGrid">
      <div class="nav-item">
        <button class="nav-btn" data-title="목 스트레칭 1" data-img="목스트레칭1.png" onclick="openInlineViewer(this)">
          목 스트레칭 1
        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="목 스트레칭 2" data-img="목스트레칭2.png" onclick="openInlineViewer(this)">
          목 스트레칭 2
        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="어깨 스트레칭" data-img="어깨스트레칭1.png" onclick="openInlineViewer(this)">
          어깨 스트레칭
        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="허리 스트레칭" data-img="허리스트레칭1.png" onclick="openInlineViewer(this)">
          허리 스트레칭
        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="허리·고관절 스트레칭" data-img="폼롤러_스트레칭.png" onclick="openInlineViewer(this)">
          허리·고관절 스트레칭
        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="무릎 스트레칭" data-img="무릎스트레칭1.png" onclick="openInlineViewer(this)">
          무릎 스트레칭
        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="발목 스트레칭 1" data-img="발목스트레칭1.png" onclick="openInlineViewer(this)">
          발목 스트레칭 1
        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="발목 스트레칭 2" data-img="발목스트레칭2.png" onclick="openInlineViewer(this)">
          발목 스트레칭 2
        </button>
      </div>
    </div>

    <footer>
      <p>반듯한정형외과 | Bonafide Orthopedic Clinic</p>
      <p>궁금하신 사항은 직원에게 언제든지 문의해주세요.</p>
      <p>📞 TEL : 02-875-7590</p>
    </footer>
  </div>

  <script>
    let currentViewer = null;

    function closeInlineViewer(){
      if(currentViewer){
        currentViewer.remove();
        currentViewer = null;
      }
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    }

    function openInlineViewer(button){
      const title = button.dataset.title || '';
      const src = button.dataset.img || '';

      const alreadyActive = button.classList.contains('active');
      if(alreadyActive){
        closeInlineViewer();
        return;
      }

      closeInlineViewer();
      button.classList.add('active');

      const viewer = document.createElement('div');
      viewer.className = 'inline-viewer';
      viewer.innerHTML = `
        <div class="inline-viewer-inner">
          <div class="inline-viewer-head">
            <div class="inline-viewer-title">${escapeHtml(title)}</div>
            <button class="inline-viewer-close" type="button" aria-label="닫기" onclick="closeInlineViewer()">×</button>
          </div>
          <img class="inline-viewer-img" src="${encodeURI(src)}" alt="${escapeHtml(title)}" loading="lazy">
        </div>
      `;

      const navItem = button.closest('.nav-item');
      navItem.insertAdjacentElement('afterend', viewer);

      currentViewer = viewer;

      setTimeout(() => {
        viewer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 50);
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#039;');
    }
  </script>
</body>
</html>
